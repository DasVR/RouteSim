name: Swift Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run StikDebugTests
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0.1"

      - name: Preflight FFI library
        run: test -f StikDebug/idevice/libidevice_ffi.a

      - name: xcodebuild test (iphonesimulator)
        run: |
          set -euo pipefail
          xcodebuild test \
            -project StikDebug.xcodeproj \
            -scheme StikDebug \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            -only-testing:StikDebugTests \
            CODE_SIGNING_ALLOWED=NO
